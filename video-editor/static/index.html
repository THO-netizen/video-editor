<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>SaykinEdit — AI Video Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #13131a;
      --surface2: #1c1c28;
      --border:   #2a2a3d;
      --accent:   #7c3aed;
      --accent2:  #a855f7;
      --yellow:   #fbbf24;
      --green:    #22c55e;
      --red:      #ef4444;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --radius:   14px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Layout ── */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
    }
